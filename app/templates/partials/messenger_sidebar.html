{% set health = health|default({}) %}
<span class="status-pill {% if health.get('whatsapp') %}ok{% endif %}" title="WhatsApp">WA {% if health.get('whatsapp') %}✓{% else %}—{% endif %}</span>
<span class="status-pill {% if health.get('telegram') %}ok{% endif %}" title="Telegram">TG {% if health.get('telegram') %}✓{% else %}—{% endif %}</span>
<span class="status-pill {% if has_api_key|default(false) %}ok{% else %}warn{% endif %}" title="OpenRouter">AI {% if has_api_key|default(false) %}✓{% else %}—{% endif %}</span>
