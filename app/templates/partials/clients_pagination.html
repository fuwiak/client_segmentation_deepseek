<nav class="pagination" aria-label="Страницы клиентов">
  {% if page > 1 %}
  <a href="/clients?{{ build_clients_query(sales_filter=sales_filter, tag=tag_filter, group=group_filter|default(''), status=status_filter, q=q_filter|default(''), phone=phone_filter|default(''), sort=sort_col|default(''), order=sort_order|default('asc'), page=1) }}"
     class="btn secondary small pagination-btn" title="Первая">«</a>
  <a href="/clients?{{ build_clients_query(sales_filter=sales_filter, tag=tag_filter, group=group_filter|default(''), status=status_filter, q=q_filter|default(''), phone=phone_filter|default(''), sort=sort_col|default(''), order=sort_order|default('asc'), page=page - 1) }}"
     class="btn secondary small pagination-btn" title="Назад">‹</a>
  {% else %}
  <span class="btn secondary small pagination-btn disabled" aria-disabled="true">«</span>
  <span class="btn secondary small pagination-btn disabled" aria-disabled="true">‹</span>
  {% endif %}

  {% for p in pagination_pages %}
    {% if p is none %}
    <span class="pagination-ellipsis">…</span>
    {% elif p == page %}
    <span class="pagination-current" aria-current="page">{{ p }}</span>
    {% else %}
    <a href="/clients?{{ build_clients_query(sales_filter=sales_filter, tag=tag_filter, group=group_filter|default(''), status=status_filter, q=q_filter|default(''), phone=phone_filter|default(''), sort=sort_col|default(''), order=sort_order|default('asc'), page=p) }}"
       class="btn secondary small pagination-num">{{ p }}</a>
    {% endif %}
  {% endfor %}

  {% if page < total_pages %}
  <a href="/clients?{{ build_clients_query(sales_filter=sales_filter, tag=tag_filter, group=group_filter|default(''), status=status_filter, q=q_filter|default(''), phone=phone_filter|default(''), sort=sort_col|default(''), order=sort_order|default('asc'), page=page + 1) }}"
     class="btn secondary small pagination-btn" title="Вперёд">›</a>
  <a href="/clients?{{ build_clients_query(sales_filter=sales_filter, tag=tag_filter, group=group_filter|default(''), status=status_filter, q=q_filter|default(''), phone=phone_filter|default(''), sort=sort_col|default(''), order=sort_order|default('asc'), page=total_pages) }}"
     class="btn secondary small pagination-btn" title="Последняя">»</a>
  {% else %}
  <span class="btn secondary small pagination-btn disabled" aria-disabled="true">›</span>
  <span class="btn secondary small pagination-btn disabled" aria-disabled="true">»</span>
  {% endif %}

  <span class="pagination-info">{{ page }} / {{ total_pages }}</span>
</nav>
