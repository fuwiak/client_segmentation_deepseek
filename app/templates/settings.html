{% extends "base.html" %}

{% block content %}
<div class="settings-grid">
  <section class="card">
    <h3>Мессенджеры</h3>
    <div hx-get="/messenger/status" hx-trigger="load" hx-swap="innerHTML"></div>
    <p class="hint"><a href="/settings/communications">Настроить автокоммуникацию →</a></p>
  </section>

  <section class="card">
    <h3>Мой Склад</h3>
    <div hx-get="/moysklad/status" hx-trigger="load" hx-swap="innerHTML"></div>
  </section>
</div>

<section class="card muted-card">
  <h3>Переменные окружения</h3>
  <ul class="env-list">
    <li><code>OPENROUTER_API_KEY</code> — AI-сегментация</li>
    <li><code>GREEN_API_ID_INSTANCE</code> / <code>GREEN_API_TOKEN</code> — WhatsApp</li>
    <li><code>TELEGRAM_BOT_TOKEN</code> — Telegram</li>
  </ul>
</section>
{% endblock %}
